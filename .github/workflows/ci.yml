name: FoodieGo CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────
  # LINT
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, food-service, order-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm install
      - name: Run ESLint
        working-directory: ${{ matrix.service }}
        run: npm run lint

  # ─────────────────────────────────────────────
  # TEST & COVERAGE
  # ─────────────────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: foodiego
          POSTGRES_PASSWORD: foodiego123
          POSTGRES_DB: foodiego_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        service: [user-service, food-service, order-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm install
      - name: Setup test database
        run: psql -h localhost -U foodiego -d foodiego_test -f infrastructure/postgres/init.sql
        env:
          PGPASSWORD: foodiego123
      - name: Run tests with coverage
        working-directory: ${{ matrix.service }}
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://foodiego:foodiego123@localhost:5432/foodiego_test
          JWT_SECRET: test_jwt_secret
          REDIS_URL: redis://localhost:6379
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage/
