name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Start Infrastructure (Docker Compose)
        run: docker compose up -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to be ready..."
          sleep 20

      - name: Run E2E Verification Scripts
        run: |
          node scripts/verify-payment.js
          node scripts/verify-timeout.js
          node scripts/verify-duplicate-webhook.js
          node scripts/verify-trace.js
          node scripts/verify-metrics.js

      - name: Tear down Infrastructure
        if: always()
        run: docker compose down
