version: '3.9'

networks:
  foodiego-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  rabbitmq-data:

services:
  # ─────────────────────────────────────────────
  # DATABASE
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: foodiego-postgres
    restart: unless-stopped
    command: postgres -c max_connections=1000
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-foodiego}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foodiego123}
      POSTGRES_DB: ${POSTGRES_DB:-foodiego}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - foodiego-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U foodiego']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # CACHE
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: foodiego-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - foodiego-net
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis123}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # IDENTITY SERVICE
  # ─────────────────────────────────────────────
  identity-service:
    build:
      context: .
      dockerfile: ./apps/identity-service/Dockerfile
    container_name: foodiego-identity-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-foodiego}:${POSTGRES_PASSWORD:-foodiego123}@postgres:5432/${POSTGRES_DB:-foodiego}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379
      SERVICE_NAME: identity-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - foodiego-net
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # RESTAURANT SERVICE
  # ─────────────────────────────────────────────
  restaurant-service:
    build:
      context: .
      dockerfile: ./apps/restaurant-service/Dockerfile
    container_name: foodiego-restaurant-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-foodiego}:${POSTGRES_PASSWORD:-foodiego123}@postgres:5432/${POSTGRES_DB:-foodiego}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379
      REDIS_TTL: ${REDIS_TTL:-300}
      SERVICE_NAME: restaurant-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
    ports:
      - '3002:3002'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - foodiego-net
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3002/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # ORDER SERVICE
  # ─────────────────────────────────────────────
  order-service:
    build:
      context: .
      dockerfile: ./apps/order-service/Dockerfile
    container_name: foodiego-order-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER:-foodiego}:${POSTGRES_PASSWORD:-foodiego123}@postgres:5432/${POSTGRES_DB:-foodiego}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379
      IDENTITY_SERVICE_URL: http://identity-service:3001
      RESTAURANT_SERVICE_URL: http://restaurant-service:3002
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      SERVICE_NAME: order-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
    ports:
      - '3003:3003'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      restaurant-service:
        condition: service_healthy
    networks:
      - foodiego-net
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3003/health']
      interval: 30s
      timeout: 10s
      retries: 3



  # ─────────────────────────────────────────────
  # INVENTORY SERVICE
  # ─────────────────────────────────────────────
  inventory-service:
    build:
      context: .
      dockerfile: ./apps/inventory-service/Dockerfile
    container_name: foodiego-inventory-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3004
      DATABASE_URL: postgresql://${POSTGRES_USER:-foodiego}:${POSTGRES_PASSWORD:-foodiego123}@postgres:5432/${POSTGRES_DB:-foodiego}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      RESERVATION_TTL: 900
      SERVICE_NAME: inventory-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
    ports:
      - '3004:3004'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - foodiego-net
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3004/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # API GATEWAY
  # ─────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: ./apps/gateway/Dockerfile
    container_name: foodiego-gateway
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      IDENTITY_SERVICE_URL: http://identity-service:3001
      RESTAURANT_SERVICE_URL: http://restaurant-service:3002
      ORDER_SERVICE_URL: http://order-service:3003
      SERVICE_NAME: gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
    ports:
      - '3000:3000'
    depends_on:
      identity-service:
        condition: service_healthy
      restaurant-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    networks:
      - foodiego-net

  # ─────────────────────────────────────────────
  # RABBITMQ
  # ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: foodiego-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - foodiego-net
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────
  # PROMETHEUS
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: foodiego-prometheus
    restart: unless-stopped
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-remote-write-receiver'
    ports:
      - '9090:9090'
    networks:
      - foodiego-net

  # ─────────────────────────────────────────────
  # LOKI (Logging)
  # ─────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: foodiego-loki
    restart: unless-stopped
    ports:
      - '3101:3100'
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - foodiego-net

  # ─────────────────────────────────────────────
  # PROMTAIL (Log Forwarder)
  # ─────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.0
    container_name: foodiego-promtail
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infrastructure/promtail/config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - foodiego-net
    depends_on:
      - loki

  # ─────────────────────────────────────────────
  # TEMPO (Tracing)
  # ─────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.2.0
    container_name: foodiego-tempo
    restart: unless-stopped
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./infrastructure/tempo/tempo.yaml:/etc/tempo.yaml
    ports:
      - '3200:3200'   # Tempo
      - '4317:4317'   # OTLP gRPC
      - '4318:4318'   # OTLP HTTP
    networks:
      - foodiego-net

  # ─────────────────────────────────────────────
  # GRAFANA
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: foodiego-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_FEATURE_TOGGLES_ENABLE: 'traceToLogs'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - '3100:3000'
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - foodiego-net
