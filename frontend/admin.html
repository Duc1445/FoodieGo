<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoodieGo - Admin Dashboard</title>
    <link rel="stylesheet" href="./style.css">
    <style>
      .admin-layout {
        display: flex;
        min-height: 100vh;
      }
      .sidebar {
        width: 250px;
        background: var(--surface);
        padding: 2rem 1rem;
        border-right: 1px solid var(--border);
      }
      .sidebar h2 { font-size: 1.5rem; color: var(--primary); margin-bottom: 2rem; text-align: center; }
      .sidebar a {
        display: block; padding: 1rem; color: var(--text-main); text-decoration: none; border-radius: 8px; margin-bottom: 0.5rem; transition: var(--transition);
      }
      .sidebar a:hover, .sidebar a.active { background: var(--primary); color: white; }
      .admin-content { flex: 1; padding: 2rem; overflow-y: auto; }
      
      .table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: var(--shadow); }
      .table th, .table td { padding: 1rem; text-align: left; border-bottom: 1px solid #eee; }
      .table th { background: #f8f9fa; font-weight: 600; }
      
      .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
      .stat-card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: var(--shadow); border-left: 4px solid var(--primary); }
      .stat-title { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem; }
      .stat-value { font-size: 1.8rem; font-weight: 700; color: #1a1a1a; }
      
      .filter-bar { display: flex; gap: 1rem; margin-bottom: 1rem; }
    </style>
  </head>
  <body>
    <div class="admin-layout" id="app">
      <!-- Injected by JS -->
    </div>
    <script type="module" src="./admin.js"></script>
  </body>
</html>
