sonar.projectKey=foodiego
sonar.projectName=FoodieGo
sonar.projectVersion=1.0.0

sonar.sources=gateway/src,user-service/src,food-service/src,order-service/src,analytics-service/src
sonar.exclusions=**/node_modules/**,**/coverage/**,**/dist/**,**/.venv/**

sonar.javascript.lcov.reportPaths=\
  user-service/coverage/lcov.info,\
  food-service/coverage/lcov.info,\
  order-service/coverage/lcov.info

sonar.python.coverage.reportPaths=analytics-service/coverage.xml

sonar.coverage.exclusions=**/index.js,**/*.test.js,**/test_*.py

# Quality Gate (tự động chặn CI nếu không đạt)
sonar.qualitygate.wait=true
